version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - depguard
  settings:
    errcheck:
      # Close() on connections and files is idiomatic to ignore in cleanup paths.
      exclude-functions:
        - (io.Closer).Close
        - (net.Conn).Close
        - (*net.TCPConn).Close
        - (*os.File).Close
        - (net.Listener).Close
        - (*net.TCPListener).Close
    depguard:
      rules:
        no-direct-auth:
          files:
            - "$all"
          deny:
            - pkg: "github.com/infodancer/auth"
              desc: "authentication goes through session-manager, not the auth library"
            - pkg: "github.com/infodancer/auth/domain"
              desc: "domain routing goes through session-manager"
            - pkg: "github.com/infodancer/auth/errors"
              desc: "auth errors are not used; session-manager handles authentication"
            - pkg: "github.com/infodancer/auth/passwd"
              desc: "passwd backend is not used directly; session-manager handles authentication"
            - pkg: "github.com/infodancer/mail-session/client"
              desc: "no direct subprocess spawning; use session-manager"
            - pkg: "github.com/infodancer/mail-deliver"
              desc: "mail-deliver is archived; delivery goes through session-manager or mail-session"
        session-manager-boundary:
          files:
            - "**/smclient*.go"
          deny:
            - pkg: "github.com/infodancer/msgstore"
              desc: "session-manager code must use mail-session proto types, not msgstore"
